name: Wiki Lint

on:
  push:
    paths:
      - 'wiki/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run wiki lint
        run: python3 scripts/lint_wiki.py
